<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolkshire's Golden Yolk Loyalty Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // M3 Inspired Palette with Golden Yolk brand primary
                        primary: '#0d6a37',
                        onPrimary: '#ffffff',
                        surface: '#ffffff',
                        onSurface: '#191c1a',
                        surfaceVariant: '#e1e5df', // tonal surface for stats/history
                        onSurfaceVariant: '#404942',
                        outline: '#707971',
                        yolkBg: '#f9fdfd',
                        warning: '#fcc314' // Gold for rewards
                    },
                    fontFamily: {
                        sans: ['Poppins', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-yolkBg flex flex-col items-center py-8 px-4 min-h-screen text-onSurface font-medium antialiased overflow-y-auto">

    <div id="app" class="bg-surface w-full max-w-sm sm:max-w-md md:max-w-[380px] rounded-3xl yolk-shadow p-6 md:p-5 md:py-8 text-center hidden border border-gray-50 fade-in m-auto relative">
        <a href="https://yolkshire.com" target="_blank" rel="noopener" class="block w-32 md:w-28 mx-auto mb-6 md:mb-5" aria-label="Visit yolkshire.com">
            <img src="yolkshire-new-logo-fhd.png" alt="Yolkshire Logo" class="w-full">
        </a>
        <div id="main-content" class="md:text-sm"></div>
    </div>

    <!-- Skeleton Loader (profile-shaped) -->
    <div id="loader" class="bg-surface w-full max-w-sm sm:max-w-md md:max-w-[400px] rounded-3xl yolk-shadow p-6 md:p-5 border border-gray-50 m-auto">
        <div class="skeleton w-32 h-10 mx-auto mb-6"></div>
        <div class="skeleton h-3 w-24 mx-auto mb-2"></div>
        <div class="skeleton h-6 w-3/4 mx-auto mb-2"></div>
        <div class="skeleton h-3 w-1/2 mx-auto mb-6"></div>
        <div class="skeleton h-5 w-full rounded-full mb-6"></div>
        <div class="flex gap-4 mb-6 items-center">
            <div class="skeleton h-16 w-1/3"></div>
            <div class="grid grid-cols-2 gap-2 flex-1">
                <div class="skeleton h-8"></div>
                <div class="skeleton h-8"></div>
                <div class="skeleton h-8"></div>
                <div class="skeleton h-8"></div>
            </div>
        </div>
        <div class="skeleton h-40 w-full rounded-3xl"></div>
    </div>

    <!-- Custom Dialog (single- or two-button) -->
    <div id="dialog" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden" onclick="closeDialog()">
        <div class="dialog-panel bg-surface rounded-2xl p-6 yolk-shadow max-w-xs w-full" onclick="event.stopPropagation()">
            <h3 id="dialog-title" class="text-xl font-bold mb-3">System Message</h3>
            <p id="dialog-message" class="text-sm text-gray-600 mb-6 font-medium"></p>
            <div class="flex gap-2">
                <button id="dialog-cancel-btn" class="flex-1 bg-surfaceVariant text-onSurfaceVariant rounded-full py-3 font-semibold text-sm uppercase tracking-wider hidden">Cancel</button>
                <button id="dialog-confirm-btn" class="flex-1 bg-surfaceVariant text-onSurfaceVariant rounded-full py-3 font-semibold text-sm uppercase tracking-wider">OK</button>
            </div>
        </div>
    </div>

    <!-- Milestone Celebration Overlay -->
    <div id="milestone" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 hidden cursor-pointer" style="background: rgba(13, 106, 55, 0.95);">
        <div class="egg-shell mb-8">
            <div class="egg-half egg-top"></div>
            <div class="egg-half egg-btm"></div>
            <div class="yolk-badge">Yolk-<br>yeah!</div>
        </div>
        <h2 class="text-white text-3xl font-black tracking-tight mb-2 text-center">FREE REWARD UNLOCKED</h2>
        <p class="text-warning text-sm font-bold uppercase tracking-[0.2em]" data-reward-num>Reward 1/3 Unlocked</p>
        <p class="text-white/70 text-xs font-medium mt-10">Tap anywhere to continue</p>
    </div>

    <script src="js/app.js"></script>

    
</body>
</html>
