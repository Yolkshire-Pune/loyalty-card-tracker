<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolkshire Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d6a37',
                        onPrimary: '#ffffff',
                        surface: '#ffffff',
                        yolkBg: '#f9fdfd',
                        warning: '#fcc314'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 antialiased p-4 sm:p-8">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-8 mt-20 text-center fade-in relative">
        <div class="absolute top-6 left-6 text-gray-400 hover:text-gray-800 transition-colors cursor-pointer" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-primary mb-2">Admin Dashboard</h1>
        <p class="text-sm text-gray-500 mb-6">Enter your details to access records</p>
        <input type="text" id="adminName" placeholder="Admin Name" class="w-full border border-gray-300 rounded-xl px-4 py-3 font-bold text-center mb-4 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        <input type="password" id="adminPin" placeholder="Admin PIN" class="w-full border border-gray-300 rounded-xl px-4 py-3 font-bold text-center mb-6 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        <button onclick="login()" class="btn-primary">Access Dashboard</button>
        <p id="login-error" class="text-red-500 text-sm font-semibold mt-3 hidden">Incorrect PIN.</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="max-w-7xl mx-auto hidden fade-in">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 id="welcome-msg" class="text-3xl font-black text-primary tracking-tight">Loyalty Records</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Manage and view all customer visits.</p>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative flex-1 sm:w-72">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Search by name, phone, or ID..." class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-2.5 font-medium text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm">
                </div>
                <button onclick="location.reload()" class="bg-gray-200 text-gray-600 w-10 h-10 rounded-xl flex items-center justify-center hover:bg-gray-300 transition-colors" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="mb-6 space-y-4">
            <div class="flex flex-wrap gap-2" id="branch-chips">
                <!-- Rendered dynamically -->
            </div>
            <div class="flex flex-wrap gap-4">
                <select id="statusFilter" onchange="renderTable()" class="appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23131313%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.6rem_auto] bg-[position:right_1rem_center] bg-no-repeat bg-white border border-gray-300 rounded-xl pl-4 pr-10 py-2 font-medium text-xs outline-none focus:border-primary">
                    <option value="All">All Statuses</option>
                    <option value="Completed">Completed (9 visits)</option>
                    <option value="Uncompleted">Uncompleted</option>
                </select>
                <select id="dateFilter" onchange="toggleCustomDateRange()" class="appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23131313%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.6rem_auto] bg-[position:right_1rem_center] bg-no-repeat bg-white border border-gray-300 rounded-xl pl-4 pr-10 py-2 font-medium text-xs outline-none focus:border-primary">
                    <option value="All">All Time (Last Visit)</option>
                    <option value="Today">Today</option>
                    <option value="ThisWeek">This Week</option>
                    <option value="Last7Days">Last 7 Days</option>
                    <option value="ThisMonth">This Month</option>
                    <option value="Last30Days">Last 30 Days</option>
                    <option value="Custom">Custom Range</option>
                </select>
                <div id="customDateRange" class="hidden items-center gap-2">
                    <input type="date" id="startDate" onchange="renderTable()" class="border border-gray-300 rounded-xl px-4 py-2 font-medium text-sm outline-none focus:border-primary">
                    <span class="text-gray-500">to</span>
                    <input type="date" id="endDate" onchange="renderTable()" class="border border-gray-300 rounded-xl px-4 py-2 font-medium text-sm outline-none focus:border-primary">
                </div>
            </div>
        </div>

        <!-- STATS CARDS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 mb-8">
            <div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary text-lg md:text-xl"><i class="fa-solid fa-users"></i></div>
                <div><p class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">Customers</p><p id="stat-total" class="text-lg md:text-2xl font-black text-gray-800">0</p></div>
            </div>
            <div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-warning/10 flex items-center justify-center text-warning text-lg md:text-xl"><i class="fa-solid fa-stamp"></i></div>
                <div><p class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">Avg Visits</p><p id="stat-avg" class="text-lg md:text-2xl font-black text-gray-800">0</p></div>
            </div>
            <div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-lg md:text-xl"><i class="fa-solid fa-fire"></i></div>
                <div><p class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">Active</p><p id="stat-active" class="text-lg md:text-2xl font-black text-gray-800">0</p></div>
            </div>
            <div class="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-gray-100 flex items-center gap-3 md:gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-green-100 flex items-center justify-center text-green-500 text-lg md:text-xl"><i class="fa-solid fa-trophy"></i></div>
                <div><p class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider">Redeemed</p><p id="stat-completed" class="text-lg md:text-2xl font-black text-gray-800">0</p></div>
            </div>
        </div>

        <div id="redemption-stats" class="mb-8 grid grid-cols-1 sm:grid-cols-3 gap-4">
            <!-- Rendered by JS -->
        </div>

        <div id="branch-performance" class="mb-8 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
            <!-- Rendered by JS -->
        </div>

        <!-- TABLE -->
        <div class="bg-transparent sm:bg-white sm:rounded-2xl sm:shadow-sm sm:border sm:border-gray-100 sm:overflow-hidden">
            <div class="">
                <table class="w-full text-left sm:border-collapse block sm:table">
                    <thead class="hidden sm:table-header-group">
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500 font-bold sm:table-row">
                            <th class="p-4">Card ID</th>
                            <th class="p-4">Customer Name</th>
                            <th class="p-4">Phone</th>
                            <th class="p-4 text-center">Visits</th>
                            <th class="p-4">Last Branch</th>
                            <th class="p-4">Last Visit Date</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-medium block sm:table-row-group">
                        <tr><td colspan="7" class="p-8 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
