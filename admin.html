<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolkshire Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d6a37',
                        onPrimary: '#ffffff',
                        surface: '#ffffff',
                        yolkBg: '#f9fdfd',
                        warning: '#fcc314'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        tr.main-row:hover { background-color: #f3f4f6; cursor: pointer; }
        .history-row { background-color: #fafafa; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 antialiased p-4 sm:p-8">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-8 mt-20 text-center fade-in">
        <h1 class="text-2xl font-bold text-primary mb-2">Admin Dashboard</h1>
        <p class="text-sm text-gray-500 mb-6">Enter your details to access records</p>
        <input type="text" id="adminName" placeholder="Admin Name" class="w-full border border-gray-300 rounded-xl px-4 py-3 font-bold text-center mb-4 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        <input type="password" id="adminPin" placeholder="Admin PIN" class="w-full border border-gray-300 rounded-xl px-4 py-3 font-bold text-center mb-6 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        <button onclick="login()" class="w-full bg-primary text-white rounded-xl py-3 font-bold uppercase tracking-wider active:scale-95 transition-transform">Access Dashboard</button>
        <p id="login-error" class="text-red-500 text-sm font-semibold mt-3 hidden">Incorrect PIN.</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="max-w-7xl mx-auto hidden fade-in">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 id="welcome-msg" class="text-3xl font-black text-primary tracking-tight">Loyalty Records</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Manage and view all customer visits.</p>
            </div>
            <div class="relative w-full sm:w-72">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Search by name, phone, or ID..." class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-2.5 font-medium text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm">
            </div>
        </div>

        <!-- FILTERS -->
        <div class="mb-6 space-y-4">
            <div class="flex flex-wrap gap-2" id="branch-chips">
                <!-- Rendered dynamically -->
            </div>
            <div class="flex flex-wrap gap-4">
                <select id="statusFilter" onchange="renderTable()" class="border border-gray-300 rounded-xl px-4 py-2 font-medium text-sm outline-none focus:border-primary">
                    <option value="All">All Statuses</option>
                    <option value="Completed">Completed (9 visits)</option>
                    <option value="Uncompleted">Uncompleted</option>
                </select>
                <select id="dateFilter" onchange="renderTable()" class="border border-gray-300 rounded-xl px-4 py-2 font-medium text-sm outline-none focus:border-primary">
                    <option value="All">All Time (Last Visit)</option>
                    <option value="Today">Today</option>
                    <option value="ThisWeek">This Week</option>
                    <option value="ThisMonth">This Month</option>
                    <option value="ThisYear">This Year</option>
                </select>
            </div>
        </div>

        <!-- STATS CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary text-xl"><i class="fa-solid fa-users"></i></div>
                <div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Filtered Customers</p><p id="stat-total" class="text-2xl font-black text-gray-800">0</p></div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-warning/20 flex items-center justify-center text-yellow-600 text-xl"><i class="fa-solid fa-stamp"></i></div>
                <div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Filtered Stamps</p><p id="stat-stamps" class="text-2xl font-black text-gray-800">0</p></div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-xl"><i class="fa-solid fa-trophy"></i></div>
                <div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Filtered Completed</p><p id="stat-completed" class="text-2xl font-black text-gray-800">0</p></div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500 font-bold">
                            <th class="p-4">Card ID</th>
                            <th class="p-4">Customer Name</th>
                            <th class="p-4">Phone</th>
                            <th class="p-4 text-center">Visits</th>
                            <th class="p-4">Last Branch</th>
                            <th class="p-4">Last Visit Date</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-medium">
                        <tr><td colspan="7" class="p-8 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/im2qg2cit3cco";
        let allData = [];
        let expandedRows = new Set();
        let selectedBranch = 'All';
        let allBranches = new Set();

        function login() {
            const pin = document.getElementById('adminPin').value;
            const name = document.getElementById('adminName').value.trim() || 'Admin';
            if (pin === "2010") {
                document.getElementById('welcome-msg').textContent = `Welcome, ${name}`;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        document.getElementById('adminPin').addEventListener('keypress', function (e) { if (e.key === 'Enter') login(); });

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                allData = data.filter(row => row.id && row.id.trim() !== "");
                
                // Extract all unique branches
                allData.forEach(u => {
                    if (u.history) {
                        const logs = u.history.split('|').filter(Boolean);
                        logs.forEach(log => {
                            if (log.includes('@')) {
                                allBranches.add(log.split('@')[1]);
                            }
                        });
                    }
                });
                
                renderBranchChips();
                renderTable();
            } catch (err) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="p-8 text-center text-red-500 font-bold">Failed to load data.</td></tr>';
            }
        }

        function renderBranchChips() {
            const container = document.getElementById('branch-chips');
            container.innerHTML = '';
            
            const branches = ['All', ...Array.from(allBranches).sort()];
            
            branches.forEach(branch => {
                const isSelected = branch === selectedBranch;
                const btn = document.createElement('button');
                btn.textContent = branch === 'All' ? 'All Branches' : branch;
                btn.className = `px-4 py-1.5 rounded-full text-xs font-bold border transition-colors ${
                    isSelected 
                    ? 'border-primary bg-primary text-white' 
                    : 'border-gray-300 bg-white text-gray-600 hover:border-primary'
                }`;
                btn.onclick = () => {
                    selectedBranch = branch;
                    renderBranchChips();
                    renderTable();
                };
                container.appendChild(btn);
            });
        }

        function extractHistoryDetails(historyStr) {
            if (!historyStr) return [];
            const logs = historyStr.split('|').filter(Boolean);
            return logs.map((log, index) => {
                let date = log;
                let branch = 'Unknown';
                if (log.includes('@')) {
                    [date, branch] = log.split('@');
                }
                return { date: new Date(date), branch, visitNumber: index + 1 };
            }).reverse(); // newest first
        }

        function isDateInRange(dateStr, rangeType) {
            if (!dateStr || dateStr === '—') return false;
            // Assumes DD/MM/YYYY format from toLocaleDateString('en-IN')
            // For proper parsing, we use the actual Date objects if possible. 
            // Let's just compare actual Date objects parsed from history if possible.
            return true; // Implemented below properly using history logs
        }

        function toggleRow(id) {
            if (expandedRows.has(id)) expandedRows.delete(id);
            else expandedRows.add(id);
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            let filtered = allData.filter(u => u.name && u.name.trim() !== "");

            // Apply Text Search
            if (search) {
                filtered = filtered.filter(u => 
                    (u.name && u.name.toLowerCase().includes(search)) ||
                    (u.phone && u.phone.includes(search)) ||
                    (u.id && u.id.toLowerCase().includes(search))
                );
            }

            // Apply Status Filter
            if (statusFilter === 'Completed') {
                filtered = filtered.filter(u => parseInt(u.visits) >= 9);
            } else if (statusFilter === 'Uncompleted') {
                filtered = filtered.filter(u => parseInt(u.visits) < 9);
            }

            // Apply Date & Branch Filter
            // If Date is not 'All' or Branch is not 'All', we check if their LATEST visit matches.
            const now = new Date();
            
            filtered = filtered.filter(u => {
                const history = extractHistoryDetails(u.history);
                if (history.length === 0) return (dateFilter === 'All' && selectedBranch === 'All');
                
                const lastVisit = history[0];
                
                // Branch check
                if (selectedBranch !== 'All' && lastVisit.branch !== selectedBranch) return false;

                // Date check
                if (dateFilter !== 'All') {
                    const diffDays = (now - lastVisit.date) / (1000 * 60 * 60 * 24);
                    if (dateFilter === 'Today' && diffDays > 1) return false;
                    if (dateFilter === 'ThisWeek' && diffDays > 7) return false;
                    if (dateFilter === 'ThisMonth' && diffDays > 30) return false;
                    if (dateFilter === 'ThisYear' && diffDays > 365) return false;
                }
                return true;
            });

            // Sort by latest visit
            filtered.sort((a, b) => {
                const ha = extractHistoryDetails(a.history);
                const hb = extractHistoryDetails(b.history);
                const da = ha.length ? ha[0].date : 0;
                const db = hb.length ? hb[0].date : 0;
                return db - da;
            });

            // Update Stats for filtered
            const totalCustomers = filtered.length;
            const totalStamps = filtered.reduce((sum, u) => sum + (parseInt(u.visits) || 0), 0);
            const completedCards = filtered.filter(u => parseInt(u.visits) >= 9).length;
            document.getElementById('stat-total').textContent = totalCustomers;
            document.getElementById('stat-stamps').textContent = totalStamps;
            document.getElementById('stat-completed').textContent = completedCards;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-gray-400">No matching records found.</td></tr>';
                return;
            }

            filtered.forEach(user => {
                const visits = parseInt(user.visits) || 0;
                const history = extractHistoryDetails(user.history);
                const lastBranch = history.length ? history[0].branch : '—';
                const badgeClass = visits >= 9 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700';
                const isExpanded = expandedRows.has(user.id);

                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100 transition-colors main-row';
                tr.onclick = () => toggleRow(user.id);
                tr.innerHTML = `
                    <td class="p-4 text-gray-500 font-semibold">#${user.id}</td>
                    <td class="p-4 font-bold text-gray-800">${user.name || '—'}</td>
                    <td class="p-4 text-gray-600">${user.phone || '—'}</td>
                    <td class="p-4 text-center">
                        <span class="${badgeClass} px-2.5 py-1 rounded-md text-xs font-black tracking-widest">${visits}/9</span>
                    </td>
                    <td class="p-4 text-gray-600">${lastBranch}</td>
                    <td class="p-4 text-gray-600">${user.last_visit || '—'}</td>
                    <td class="p-4 text-gray-400 text-right">
                        <i class="fa-solid fa-chevron-${isExpanded ? 'up' : 'down'}"></i>
                    </td>
                `;
                tbody.appendChild(tr);

                if (isExpanded) {
                    const histTr = document.createElement('tr');
                    histTr.className = 'history-row border-b border-gray-200';
                    
                    let histHTML = '<td colspan="7" class="p-6">';
                    histHTML += '<p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Visit History</p>';
                    histHTML += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
                    
                    if (history.length === 0) {
                        histHTML += '<p class="text-sm text-gray-500">No visits recorded.</p>';
                    } else {
                        history.forEach(item => {
                            const d = item.date;
                            const dateStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                            const timeStr = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                            histHTML += `
                                <div class="bg-white border border-gray-200 p-3 rounded-xl flex justify-between items-center">
                                    <div>
                                        <p class="text-xs font-bold text-gray-500 uppercase">Visit #${item.visitNumber}</p>
                                        <p class="font-bold text-gray-800">${dateStr}</p>
                                        <p class="text-[10px] font-semibold text-gray-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${item.branch}</p>
                                    </div>
                                    <p class="text-xs font-semibold text-gray-400">${timeStr}</p>
                                </div>
                            `;
                        });
                    }
                    
                    histHTML += '</div></td>';
                    histTr.innerHTML = histHTML;
                    tbody.appendChild(histTr);
                }
            });
        }
    </script>
</body>
</html>
